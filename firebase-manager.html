<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firebase Menu Manager</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 900px;
        width: 100%;
      }
      h1 {
        color: #333;
        margin-top: 0;
      }
      .section {
        margin-bottom: 40px;
        padding-bottom: 30px;
        border-bottom: 2px solid #eee;
      }
      .section:last-child {
        border-bottom: none;
      }
      button {
        background: #27ae60;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        margin-right: 10px;
        margin-bottom: 10px;
      }
      button:hover {
        background: #229954;
      }
      button.danger {
        background: #e74c3c;
      }
      button.danger:hover {
        background: #c0392b;
      }
      #status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
      #status.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      #status.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
      #status.info {
        background: #d1ecf1;
        color: #0c5460;
        display: block;
      }
      .item-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 15px;
        margin-top: 20px;
        max-height: 500px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 8px;
      }
      .item-card {
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 15px;
        background: #f9f9f9;
      }
      .item-card h3 {
        margin: 0 0 10px 0;
        color: #333;
      }
      .item-card p {
        margin: 5px 0;
        font-size: 14px;
        color: #666;
      }
      .item-card small {
        display: block;
        margin-top: 10px;
        color: #999;
      }
      .stats {
        background: #f0f0f0;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .stats p {
        margin: 5px 0;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔧 Firebase Menu Manager</h1>

      <div class="section">
        <h2>📊 View All Items</h2>
        <button onclick="loadAllItems()">Load All Items</button>
        <div class="stats">
          <p>Total Items: <span id="totalCount">0</span></p>
          <p>SOHO Items: <span id="sohoCount">0</span></p>
          <p>ISTIKNANAH Items: <span id="istikCount">0</span></p>
        </div>
        <div id="itemsGrid" class="item-grid"></div>
      </div>

      <div class="section">
        <h2>🗑️ Danger Zone</h2>
        <button class="danger" onclick="deleteAllItems()">
          Delete ALL Items (Cannot Undo!)
        </button>
        <p style="color: red; font-weight: bold">
          ⚠️ This will permanently delete all 132 items from Firebase!
        </p>
      </div>

      <div class="section">
        <h2>📤 Upload Fresh Data</h2>
        <button onclick="uploadFreshData()">Upload All Items (Clean)</button>
        <p>
          This will upload all items with unique data. Make sure you deleted old
          items first!
        </p>
      </div>

      <div id="status"></div>
    </div>

    <script src="firebase-rest-client.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCoiuHbVfclITv_Ah6UOQeV33QGPGRVeXw",
        projectId: "menu1-ec4bc",
      };

      let firebaseAPI = null;

      function initFirebase() {
        firebaseAPI = new FirebaseAPI(firebaseConfig);
      }

      function showStatus(message, type) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = message;
        statusEl.className = type;
      }

      async function loadAllItems() {
        try {
          initFirebase();
          showStatus("🔄 Loading items...", "info");

          const items = await firebaseAPI.getAll("menus");

          if (!items || items.length === 0) {
            showStatus("❌ No items found in Firebase", "error");
            document.getElementById("itemsGrid").innerHTML = "";
            return;
          }

          let sohoCount = 0,
            istikCount = 0;
          document.getElementById("totalCount").textContent = items.length;

          let html = "";
          items.forEach((item) => {
            if (item.menu === "soho") sohoCount++;
            if (item.menu === "istik") istikCount++;

            html += `<div class="item-card">
                        <h3>${item.name}</h3>
                        <p><strong>Arabic:</strong> ${item.nameAr}</p>
                        <p><strong>Price:</strong> EGP ${item.price}</p>
                        <p><strong>Menu:</strong> ${item.menu.toUpperCase()}</p>
                        <p><strong>Category:</strong> ${item.category}</p>
                        <small>ID: ${item.id}</small>
                    </div>`;
          });

          document.getElementById("sohoCount").textContent = sohoCount;
          document.getElementById("istikCount").textContent = istikCount;
          document.getElementById("itemsGrid").innerHTML = html;
          showStatus(
            `✅ Loaded ${items.length} items (${sohoCount} SOHO, ${istikCount} ISTIKNANAH)`,
            "success",
          );
        } catch (error) {
          showStatus(`❌ Error: ${error.message}`, "error");
        }
      }

      async function deleteAllItems() {
        if (
          !confirm(
            "⚠️ Are you ABSOLUTELY sure? This will delete ALL 132 items!",
          )
        )
          return;
        if (
          !confirm(
            "This is your last chance! Click OK to DELETE ALL ITEMS PERMANENTLY!",
          )
        )
          return;

        try {
          initFirebase();
          showStatus("🔄 Deleting all items...", "info");

          const items = await firebaseAPI.getAll("menus");
          let deletedCount = 0;

          for (const item of items) {
            try {
              await firebaseAPI.deleteDoc("menus", item.id);
              deletedCount++;
            } catch (e) {
              console.error(`Failed to delete ${item.id}:`, e);
            }
          }

          showStatus(
            `✅ Deleted ${deletedCount} items! Firebase is now empty.`,
            "success",
          );
          document.getElementById("totalCount").textContent = "0";
          document.getElementById("sohoCount").textContent = "0";
          document.getElementById("istikCount").textContent = "0";
          document.getElementById("itemsGrid").innerHTML = "";
        } catch (error) {
          showStatus(`❌ Error: ${error.message}`, "error");
        }
      }

      async function uploadFreshData() {
        try {
          initFirebase();
          showStatus("🔄 Uploading fresh data...", "info");

          const items = extractMenuItems();
          let uploadedCount = 0;
          let errorCount = 0;

          for (let i = 0; i < items.length; i++) {
            try {
              await firebaseAPI.createDoc("menus", items[i]);
              uploadedCount++;
              if (uploadedCount % 20 === 0) {
                console.log(`Uploaded ${uploadedCount}/${items.length}`);
              }
            } catch (error) {
              errorCount++;
              console.error(`Error uploading item ${i}:`, error);
            }
          }

          showStatus(
            `✅ Upload Complete! ${uploadedCount} items uploaded, ${errorCount} errors`,
            "success",
          );
          loadAllItems();
        } catch (error) {
          showStatus(`❌ Error: ${error.message}`, "error");
        }
      }

      function extractMenuItems() {
        const istikMenu = {
          "☕ Hot Beverages": [
            {
              name: "Tea/Green Tea",
              ar: { name: "شاي/شاى اخضر", desc: "طبق شهي من أطباقنا الخاصة" },
              desc: "",
              price: 35,
            },
            {
              name: "Tea Pot (4 Cups)",
              ar: {
                name: "ابريق شاي ( 4 استكانة )",
                desc: "طبق شهي من أطباقنا الخاصة",
              },
              desc: "",
              price: 120,
            },
            {
              name: "Espresso Single",
              ar: { name: "اسبرسو سينجل", desc: "طبق شهي من أطباقنا الخاصة" },
              desc: "",
              price: 80,
            },
            {
              name: "Cappuccino",
              ar: { name: "كابيتشينو", desc: "طبق شهي من أطباقنا الخاصة" },
              desc: "",
              price: 100,
            },
          ],
          "🧃 Fresh Juices": [
            {
              name: "Orange",
              ar: { name: "برتقال", desc: "طبق شهي من أطباقنا الخاصة" },
              desc: "",
              price: 80,
            },
            {
              name: "Mango",
              ar: { name: "مانجو", desc: "طبق شهي من أطباقنا الخاصة" },
              desc: "",
              price: 80,
            },
          ],
        };

        const sohoMenu = {
          "❄️ Cold Beverages": [
            {
              name: "Mineral Water",
              ar: { name: "مياه معدنيه فلو", desc: "مياه معدنية منعشة" },
              desc: "",
              price: 35,
            },
            {
              name: "Red Bull",
              ar: { name: "ريد بول", desc: "مشروب الطاقة البارد والمنعش" },
              desc: "",
              price: 85,
            },
          ],
          "🍲 Soups": [
            {
              name: "Chicken Cream Soup",
              ar: {
                name: "شوربة كريمة الدجاج",
                desc: "شوربة دجاج كريمية مع أعشاب طازة",
              },
              desc: "",
              price: 89,
            },
          ],
        };

        const items = [];

        for (const [category, categoryItems] of Object.entries(sohoMenu)) {
          categoryItems.forEach((item) => {
            items.push({
              menu: "soho",
              category: category,
              name: item.name,
              nameAr: item.ar.name,
              desc: item.desc,
              descAr: item.ar.desc,
              price: item.price,
              createdAt: new Date().toISOString(),
            });
          });
        }

        for (const [category, categoryItems] of Object.entries(istikMenu)) {
          categoryItems.forEach((item) => {
            items.push({
              menu: "istik",
              category: category,
              name: item.name,
              nameAr: item.ar.name,
              desc: item.desc,
              descAr: item.ar.desc,
              price: item.price,
              createdAt: new Date().toISOString(),
            });
          });
        }

        console.log("Extracted items:", items);
        return items;
      }

      // Load on page ready
      document.addEventListener("DOMContentLoaded", () => {
        console.log("Firebase Manager loaded");
      });
    </script>
  </body>
</html>
