async function startUpload() {
  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = '⏳ Deleting old data…';

  log('🧹 STEP 1: Deleting ALL existing data in Firebase (including corrupted items)…', 'info');
  try {
    // 1. Fetch raw documents directly to get the unstripped corrupt names
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents/menus?pageSize=500&key=${FB_CONFIG.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    const docs = data.documents || [];
    
    if (docs.length > 0) {
      log(`Found ${docs.length} existing items. Deleting...`, 'warn');
      for (let i = 0; i < docs.length; i++) {
        const docName = docs[i].name;
        // The docName already contains ?key=... if it's corrupted, or we need to add ?key= if not
        const sep = docName.includes('?') ? '&' : '?';
        const deleteUrl = `https://firestore.googleapis.com/v1/${docName}${sep}key=${FB_CONFIG.apiKey}`;
        
        await fetch(deleteUrl, { method: 'DELETE' });
        if ((i + 1) % 20 === 0) log(`Deleted ${i + 1}/${docs.length}...`);
      }
      log(`✅ Successfully wiped ${docs.length} old documents.`, 'ok');
    } else {
      log('Database already empty. Proceeding...', 'ok');
    }
  } catch(e) {
    log('❌ Error during deletion: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '⬆️ Upload All Menu Data';
    return;
  }

  // 2. Re-seed clean data
  btn.textContent = '⏳ Seeding new data…';
  let ok = 0, fail = 0;
  const allItems = [
    ...SOHO_ITEMS.map(i => ({...i, menu:'soho'})),
    ...ISTIK_ITEMS.map(i => ({...i, menu:'istik'}))
  ];

  log(`📦 STEP 2: Starting upload of ${allItems.length} clean items (${SOHO_ITEMS.length} SOHO + ${ISTIK_ITEMS.length} ISTIK)…`, 'info');

  for (const item of allItems) {
    try {
      await db.create('menus', item);
      ok++;
      if (ok % 20 === 0 || ok === allItems.length) {
        log(`✅ ${ok}/${allItems.length} uploaded…`, 'ok');
      }
    } catch(e) {
      fail++;
      log(`❌ Failed: ${item.nameAr} — ${e.message}`, 'err');
    }
    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 80));
  }

  log('', 'info');
  log(`🎉 Done! ${ok} items uploaded successfully. ${fail ? fail + ' failed.' : ''}`, ok > 0 ? 'ok' : 'err');
  log('👉 You can now manage items normally without duplicates or errors.', 'info');
  btn.textContent = '✅ Upload Complete';
}
