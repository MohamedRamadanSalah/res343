<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Menu Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Outfit", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* ===== LOGIN SCREEN ===== */
      .login-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 1000;
      }

      .login-screen.hidden {
        display: none;
      }

      .login-box {
        background: white;
        padding: 50px;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 100%;
      }

      .login-box h1 {
        margin-bottom: 30px;
        color: #333;
        text-align: center;
        font-size: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 600;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .form-group button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }

      .form-group button:hover {
        background: #5568d3;
      }

      .error-message {
        color: #e74c3c;
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
      }

      /* ===== MAIN DASHBOARD ===== */
      .dashboard {
        display: none;
      }

      .dashboard.active {
        display: block;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        color: #333;
        font-size: 28px;
      }

      .logout-btn {
        padding: 10px 20px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
      }

      .logout-btn:hover {
        background: #c0392b;
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 30px;
      }

      @media (max-width: 1024px) {
        .content {
          grid-template-columns: 1fr;
        }
      }

      /* ===== ADD ITEM FORM ===== */
      .add-item-panel {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }

      .add-item-panel h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 22px;
      }

      .form-section {
        margin-bottom: 20px;
      }

      .form-section label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 600;
        font-size: 14px;
      }

      .form-section input,
      .form-section textarea,
      .form-section select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }

      .form-section textarea {
        resize: vertical;
        min-height: 80px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .btn-add {
        width: 100%;
        padding: 12px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
        margin-top: 10px;
      }

      .btn-add:hover {
        background: #229954;
      }

      /* ===== MENU ITEMS LIST ===== */
      .items-panel {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .items-panel h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 22px;
      }

      .menu-filter {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 8px 15px;
        border: 2px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
      }

      .filter-btn.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }

      .items-list {
        max-height: 600px;
        overflow-y: auto;
      }

      .item-card {
        background: #f8f9fa;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        border-left: 4px solid #667eea;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .item-info h3 {
        color: #333;
        margin-bottom: 5px;
        font-size: 16px;
      }

      .item-info p {
        color: #777;
        font-size: 13px;
        margin: 3px 0;
      }

      .item-price {
        background: #667eea;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: 600;
        margin: 0 10px;
      }

      .item-actions {
        display: flex;
        gap: 10px;
      }

      .btn-sm {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-edit {
        background: #3498db;
        color: white;
      }

      .btn-edit:hover {
        background: #2980b9;
      }

      .btn-delete {
        background: #e74c3c;
        color: white;
      }

      .btn-delete:hover {
        background: #c0392b;
      }

      /* ===== EDIT MODAL ===== */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 500;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 10px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-content h2 {
        color: #333;
        margin-bottom: 20px;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .modal-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-save {
        background: #27ae60;
        color: white;
      }

      .btn-save:hover {
        background: #229954;
      }

      .btn-cancel {
        background: #95a5a6;
        color: white;
      }

      .btn-cancel:hover {
        background: #7f8c8d;
      }

      /* ===== NOTIFICATIONS ===== */
      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        animation: slideIn 0.3s ease;
        z-index: 2000;
      }

      .notification.success {
        background: #27ae60;
      }

      .notification.error {
        background: #e74c3c;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-box">
        <h1>🔐 Admin Panel</h1>
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required />
          </div>
          <div class="form-group">
            <button type="submit">Login</button>
          </div>
          <div id="loginError" class="error-message"></div>
        </form>
      </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="dashboard" id="dashboard">
      <div class="container">
        <div class="header">
          <h1>📋 Menu Manager</h1>
          <div style="display: flex; align-items: center; gap: 20px">
            <span id="userEmail" style="color: white; font-weight: 600"></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
          </div>
        </div>

        <div class="content">
          <!-- ADD ITEM FORM -->
          <div class="add-item-panel">
            <h2>➕ Add New Item</h2>
            <form id="addItemForm">
              <div class="form-section">
                <label>Select Menu *</label>
                <select id="menuSelect" required>
                  <option value="">Choose Menu</option>
                  <option value="soho">🍔 SOHO</option>
                  <option value="istik">☕ ISTIKNANAH</option>
                </select>
              </div>

              <div class="form-section">
                <label>Category *</label>
                <input
                  type="text"
                  id="category"
                  placeholder="e.g., Sandwiches, Hot Drinks"
                  required
                />
              </div>

              <div class="form-section">
                <label>Item Name (English) *</label>
                <input
                  type="text"
                  id="itemName"
                  placeholder="e.g., Classic Burger"
                  required
                />
              </div>

              <div class="form-section">
                <label>Item Name (Arabic) *</label>
                <input
                  type="text"
                  id="itemNameAr"
                  placeholder="e.g., برجر كلاسيكي"
                  required
                />
              </div>

              <div class="form-section">
                <label>Description (English)</label>
                <textarea
                  id="itemDesc"
                  placeholder="Describe the item..."
                ></textarea>
              </div>

              <div class="form-section">
                <label>Description (Arabic)</label>
                <textarea
                  id="itemDescAr"
                  placeholder="وصف العنصر..."
                ></textarea>
              </div>

              <div class="form-section">
                <label>Price (EGP) *</label>
                <input
                  type="number"
                  id="itemPrice"
                  min="1"
                  step="0.01"
                  required
                />
              </div>

              <button type="submit" class="btn-add">Add Item</button>
            </form>
          </div>

          <!-- ITEMS LIST -->
          <div class="items-panel">
            <h2>📄 Menu Items</h2>

            <div class="menu-filter">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="soho">SOHO</button>
              <button class="filter-btn" data-filter="istik">ISTIKNANAH</button>
            </div>

            <div class="items-list" id="itemsList">
              <div class="loading">Loading items...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal" id="editModal">
      <div class="modal-content">
        <h2>✏️ Edit Item</h2>
        <form id="editItemForm">
          <div class="form-section">
            <label>Item Name (English) *</label>
            <input type="text" id="editItemName" required />
          </div>

          <div class="form-section">
            <label>Item Name (Arabic) *</label>
            <input type="text" id="editItemNameAr" required />
          </div>

          <div class="form-section">
            <label>Description (English)</label>
            <textarea id="editItemDesc"></textarea>
          </div>

          <div class="form-section">
            <label>Description (Arabic)</label>
            <textarea id="editItemDescAr"></textarea>
          </div>

          <div class="form-section">
            <label>Price (EGP) *</label>
            <input
              type="number"
              id="editItemPrice"
              min="1"
              step="0.01"
              required
            />
          </div>

          <div class="modal-actions">
            <button type="submit" class="btn-save">Save Changes</button>
            <button type="button" class="btn-cancel" id="cancelEditBtn">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Firebase REST API Integration -->
    <script src="firebase-rest-client.js"></script>
    <script>
      // ===== FIREBASE CONFIG =====
      const firebaseConfig = {
        apiKey: "AIzaSyCoiuHbVfclITv_Ah6UOQeV33QGPGRVeXw",
        projectId: "menu1-ec4bc",
      };

      // Admin credentials
      const ADMIN_CREDENTIALS = {
        email: "admin@menu.com",
        password: "admin123",
      };

      let firebaseAPI = null;

      // Initialize Firebase
      function initializeAdmin() {
        try {
          firebaseAPI = new FirebaseAPI(firebaseConfig);
          console.log("✅ Firebase initialized for Admin");
          updateAuthUI();
        } catch (error) {
          console.error("Firebase error:", error);
        }
      }

      // Initialize on load
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeAdmin);
      } else {
        initializeAdmin();
      }

      // DOM Elements
      const loginScreen = document.getElementById("loginScreen");
      const dashboard = document.getElementById("dashboard");
      const loginForm = document.getElementById("loginForm");
      const logoutBtn = document.getElementById("logoutBtn");
      const addItemForm = document.getElementById("addItemForm");
      const itemsList = document.getElementById("itemsList");
      const editModal = document.getElementById("editModal");
      const editItemForm = document.getElementById("editItemForm");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const filterBtns = document.querySelectorAll(".filter-btn");

      let currentUser = null;
      let currentFilter = "all";
      let editingItemId = null;
      let editingItemMenu = null;

      // ===== AUTHENTICATION =====
      // Update UI based on login state
      function updateAuthUI() {
        if (currentUser) {
          loginScreen.classList.add("hidden");
          dashboard.classList.add("active");
          document.getElementById("userEmail").textContent = currentUser.email;
          loadItems();
        } else {
          loginScreen.classList.remove("hidden");
          dashboard.classList.remove("active");
        }
      }

      // Initialize authentication UI on page load
      window.addEventListener("DOMContentLoaded", updateAuthUI);

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const errorDiv = document.getElementById("loginError");

        try {
          // Simple credential validation
          if (
            email === ADMIN_CREDENTIALS.email &&
            password === ADMIN_CREDENTIALS.password
          ) {
            currentUser = { email };
            loginForm.reset();
            errorDiv.textContent = "";
            updateAuthUI();
          } else {
            throw new Error("Invalid email or password");
          }
        } catch (error) {
          errorDiv.textContent = "❌ " + error.message;
        }
      });

      logoutBtn.addEventListener("click", () => {
        currentUser = null;
        updateAuthUI();
      });

      // ===== ADD ITEM =====
      addItemForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const menu = document.getElementById("menuSelect").value;
        const category = document.getElementById("category").value;
        const itemName = document.getElementById("itemName").value;
        const itemNameAr = document.getElementById("itemNameAr").value;
        const itemDesc = document.getElementById("itemDesc").value;
        const itemDescAr = document.getElementById("itemDescAr").value;
        const price = parseFloat(document.getElementById("itemPrice").value);

        try {
          const itemData = {
            menu,
            category,
            name: itemName,
            nameAr: itemNameAr,
            desc: itemDesc,
            descAr: itemDescAr,
            price,
            createdBy: currentUser.email,
            createdAt: new Date().toISOString(),
          };

          await firebaseAPI.createDoc("menus", itemData);

          showNotification("Item added successfully!", "success");
          addItemForm.reset();
          loadItems();
        } catch (error) {
          showNotification("Error adding item: " + error.message, "error");
        }
      });

      // ===== LOAD ITEMS =====
      async function loadItems() {
        try {
          itemsList.innerHTML = '<div class="loading">Loading items...</div>';
          const items = await firebaseAPI.getAll("menus");

          if (!items || items.length === 0) {
            itemsList.innerHTML =
              '<div class="loading">No items yet. Add your first item!</div>';
            return;
          }

          displayItems(items);
        } catch (error) {
          showNotification("Error loading items: " + error.message, "error");
        }
      }

      function displayItems(items) {
        itemsList.innerHTML = "";

        const filtered =
          currentFilter === "all"
            ? items
            : items.filter((item) => item.menu === currentFilter);

        if (filtered.length === 0) {
          itemsList.innerHTML = '<div class="loading">No items found</div>';
          return;
        }

        filtered.forEach((item) => {
          const itemCard = document.createElement("div");
          itemCard.className = "item-card";
          itemCard.innerHTML = `
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p><strong>Arabic:</strong> ${item.nameAr}</p>
                        <p><strong>Category:</strong> ${item.category}</p>
                        <p><strong>Menu:</strong> ${item.menu === "soho" ? "🍔 SOHO" : "☕ ISTIKNANAH"}</p>
                    </div>
                    <div class="item-price">EGP ${item.price.toFixed(2)}</div>
                    <div class="item-actions">
                        <button class="btn-sm btn-edit" onclick="editItem('${item.id}', '${item.menu}')">Edit</button>
                        <button class="btn-sm btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                    </div>
                `;
          itemsList.appendChild(itemCard);
        });
      }

      // ===== EDIT ITEM =====
      window.editItem = async (itemId, menu) => {
        try {
          const item = await firebaseAPI.getDoc("menus", itemId);

          if (!item) throw new Error("Item not found");

          document.getElementById("editItemName").value = item.name;
          document.getElementById("editItemNameAr").value = item.nameAr;
          document.getElementById("editItemDesc").value = item.desc || "";
          document.getElementById("editItemDescAr").value = item.descAr || "";
          document.getElementById("editItemPrice").value = item.price;

          editingItemId = itemId;
          editingItemMenu = menu;
          editModal.classList.add("active");
        } catch (error) {
          showNotification("Error loading item: " + error.message, "error");
        }
      };

      editItemForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
          const updates = {
            name: document.getElementById("editItemName").value,
            nameAr: document.getElementById("editItemNameAr").value,
            desc: document.getElementById("editItemDesc").value,
            descAr: document.getElementById("editItemDescAr").value,
            price: parseFloat(document.getElementById("editItemPrice").value),
            updatedAt: new Date().toISOString(),
          };

          await firebaseAPI.updateDoc("menus", editingItemId, updates);

          showNotification("Item updated successfully!", "success");
          editModal.classList.remove("active");
          loadItems();
        } catch (error) {
          showNotification("Error updating item: " + error.message, "error");
        }
      });

      cancelEditBtn.addEventListener("click", () => {
        editModal.classList.remove("active");
      });

      // ===== DELETE ITEM =====
      window.deleteItem = async (itemId) => {
        if (confirm("Are you sure you want to delete this item?")) {
          try {
            await firebaseAPI.deleteDoc("menus", itemId);

            showNotification("Item deleted successfully!", "success");
            loadItems();
          } catch (error) {
            showNotification("Error deleting item: " + error.message, "error");
          }
        }
      };

      // ===== FILTER =====
      filterBtns.forEach((btn) => {
        btn.addEventListener("click", async () => {
          filterBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          loadItems();
        });
      });

      // ===== NOTIFICATIONS =====
      function showNotification(message, type) {
        const notification = document.createElement("div");
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.remove();
        }, 3000);
      }
    </script>
  </body>
</html>
