        padding: 15px 30px;

        font-size: 16px;
        font-weight: 600;

        margin-top: 20px;

      }
      button:disabled {
        background: #95a5a6;

        padding: 15px;
        border-radius: 8px;
        display: none;
      }
      #status.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      #status.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
      #status.info {
        background: #d1ecf1;
        color: #0c5460;
        display: block;
      }
      #progress {
        margin-top: 20px;
        display: none;
      }
      .progress-bar {
        width: 100%;
        height: 20px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #27ae60;
        width: 0%;
        transition: width 0.3s;
      }
      .count {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
      }

      // Update UI status
      function showStatus(message, type) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = message;
        statusEl.className = type;
      }

      // Upload all items
      async function uploadAllItems() {
        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;

        try {
          initFirebase();
          showStatus("🔄 Starting upload...", "info");

          // Extract items
          allItems = extractMenuItems();
          const totalItems = allItems.length;

          document.getElementById("progress").style.display = "block";
          document.getElementById("totalCount").textContent = totalItems;

          let uploadedCount = 0;
          let errorCount = 0;

          // Upload each item
          for (let i = 0; i < allItems.length; i++) {
            try {
              await firebaseAPI.createDoc("menus", allItems[i]);
              uploadedCount++;
              document.getElementById("itemCount").textContent = uploadedCount;
              document.getElementById("progressFill").style.width =
                (uploadedCount / totalItems) * 100 + "%";
            } catch (error) {
              errorCount++;
              const errorMsg = error.message || JSON.stringify(error);
              console.error(`❌ Error uploading item ${i}:`, errorMsg);
              // Show first error details
              if (errorCount === 1) {
                document.getElementById("errors").style.display = "block";
                document.getElementById("firstError").textContent = errorMsg;
              }
            }
          }

          btn.disabled = false;
          showStatus(
            `✅ Upload Complete! ${uploadedCount} items uploaded, ${errorCount} errors`,
            "success",
          );
        } catch (error) {
          btn.disabled = false;
          showStatus(`❌ Error: ${error.message}`, "error");
          console.error(error);
        }
      }
