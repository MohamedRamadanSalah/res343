<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Menu to Firebase</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 600px;
        width: 100%;
      }
      h1 {
        color: #333;
        margin: 0 0 20px 0;
      }
      p {
        color: #666;
        line-height: 1.6;
      }
      button {
        background: #27ae60;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        width: 100%;
        margin-top: 20px;
      }
      button:hover {
        background: #229954;
      }
      button:disabled {
        background: #95a5a6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
      #status.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      #status.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
      #status.info {
        background: #d1ecf1;
        color: #0c5460;
        display: block;
      }
      #progress {
        margin-top: 20px;
        display: none;
      }
      .progress-bar {
        width: 100%;
        height: 20px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #27ae60;
        width: 0%;
        transition: width 0.3s;
      }
      .count {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📤 Upload Menu to Firebase</h1>
      <p>
        This will upload all menu items from the HTML to Firebase Firestore. You
        can then manage them in the admin panel.
      </p>
      <p>
        <strong>WARNING:</strong> This will upload approximately 140+ items.
        Make sure Firebase is ready.
      </p>

      <button id="uploadBtn" onclick="uploadAllItems()">Start Upload</button>

      <div id="status"></div>
      <div id="progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="count">
          Uploading: <span id="itemCount">0</span> /
          <span id="totalCount">0</span>
        </div>
      </div>
    </div>

    <script src="firebase-rest-client.js"></script>

      // Initialize Firebase

              menu: "soho",

        for (const [category, categoryItems] of Object.entries(istikMenu)) {

      }

      // Update UI status
      function showStatus(message, type) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = message;
        statusEl.className = type;
      }

      // Upload all items
      async function uploadAllItems() {
        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;

        try {
          initFirebase();
          showStatus("🔄 Starting upload...", "info");

          // Extract items
          allItems = extractMenuItems();
          const totalItems = allItems.length;

          document.getElementById("progress").style.display = "block";
          document.getElementById("totalCount").textContent = totalItems;

          let uploadedCount = 0;
          let errorCount = 0;

          // Upload each item
          for (let i = 0; i < allItems.length; i++) {
            try {
              await firebaseAPI.createDoc("menus", allItems[i]);
              uploadedCount++;
              document.getElementById("itemCount").textContent = uploadedCount;
              document.getElementById("progressFill").style.width =
                (uploadedCount / totalItems) * 100 + "%";
            } catch (error) {
              errorCount++;
              console.error(`Error uploading item ${i}:`, error);
            }
          }

          btn.disabled = false;
          showStatus(
            `✅ Upload Complete! ${uploadedCount} items uploaded, ${errorCount} errors`,
            "success",
          );
        } catch (error) {
          btn.disabled = false;
          showStatus(`❌ Error: ${error.message}`, "error");
          console.error(error);
        }
      }
    </script>
  </body>
</html>
